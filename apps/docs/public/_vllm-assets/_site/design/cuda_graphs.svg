<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="CUDA Graphs in vLLM v1: a runtime dispatcher inspects the batch shape; uniform-decode batches replay a full captured CUDA Graph; prefill or mixed batches fall back to a piecewise graph that excludes the attention region. Both share the same compiled forward — capture is orthogonal to compilation.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.4; stroke-width: 1.5; fill: none; }
    .core-fill   { fill: #fdb517; }
    .core-stroke { stroke: #e5a315; stroke-width: 1.75; fill: none; }
    .core-text   { fill: #1c1917; }
    .full-fill   { fill: #fdb517; fill-opacity: 0.45; }
    .full-stroke { stroke: #e5a315; stroke-width: 1.25; fill: none; }
    .piece-fill  { fill: #30a2ff; fill-opacity: 0.16; }
    .piece-stroke{ stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1.25; fill: none; }
    .eager-fill  { fill: #94a3b8; fill-opacity: 0.18; }
    .eager-stroke{ stroke: #94a3b8; stroke-opacity: 0.55; stroke-width: 1.25; stroke-dasharray: 4 3; fill: none; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1.5; stroke-linecap: round; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.45; }
      .core-stroke { stroke: #fbc04a; }
      .full-fill   { fill: #fdb517; fill-opacity: 0.4; }
      .full-stroke { stroke: #fbc04a; }
      .piece-fill  { fill: #30a2ff; fill-opacity: 0.22; }
      .piece-stroke{ stroke: #30a2ff; stroke-opacity: 0.6; }
      .eager-fill  { fill: #475569; fill-opacity: 0.3; }
      .eager-stroke{ stroke: #94a3b8; stroke-opacity: 0.6; }
      .conn   { stroke: #30a2ff; stroke-opacity: 0.65; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
  </defs>

  <!-- Header -->
  <text x="480" y="32" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">CUDA GRAPHS · DISPATCHER PICKS PER BATCH</text>

  <!-- Incoming batch card -->
  <g>
    <rect x="30" y="74" width="220" height="80" rx="12" class="card-fill" />
    <rect x="30" y="74" width="220" height="80" rx="12" class="card-stroke" />
    <text x="140" y="102" text-anchor="middle" class="title" font-size="13" font-weight="700">Incoming batch</text>
    <text x="140" y="122" text-anchor="middle" class="muted" font-size="11">prefill · decode · mixed</text>
    <text x="140" y="142" text-anchor="middle" class="muted mono" font-size="10.5">max_query_len, shape, …</text>
  </g>

  <!-- Arrow to dispatcher -->
  <path d="M 252 114 L 312 114" class="conn" marker-end="url(#arr)" />

  <!-- Dispatcher (yellow focal — the new central controller) -->
  <g>
    <rect x="314" y="68" width="332" height="92" rx="14" class="core-fill" />
    <rect x="314" y="68" width="332" height="92" rx="14" class="core-stroke" />
    <text x="480" y="98" text-anchor="middle" class="core-text" font-size="15" font-weight="700">CUDAGraph Dispatcher</text>
    <text x="480" y="118" text-anchor="middle" class="core-text" font-size="11" opacity="0.78">classify batch shape · pick runtime mode</text>
    <text x="480" y="138" text-anchor="middle" class="core-text mono" font-size="11" opacity="0.85">cudagraph_mode = {NONE · PIECEWISE · FULL_DECODE · FULL}</text>
    <text x="480" y="154" text-anchor="middle" class="core-text" font-size="10" opacity="0.7" letter-spacing="1.5" font-weight="600">v1 · ORTHOGONAL TO COMPILATION</text>
  </g>

  <!-- Three branches: FULL_DECODE / PIECEWISE / NONE-EAGER -->
  <path d="M 360 160 L 360 188 L 200 188 L 200 218" class="conn" marker-end="url(#arr)" />
  <path d="M 480 162 L 480 218" class="conn" marker-end="url(#arr)" />
  <path d="M 600 160 L 600 188 L 760 188 L 760 218" class="conn" marker-end="url(#arr)" />

  <!-- Branch labels -->
  <text x="200" y="200" text-anchor="middle" class="muted" font-size="10.5">uniform decode</text>
  <text x="480" y="184" text-anchor="middle" class="muted" font-size="10.5">prefill / mixed</text>
  <text x="760" y="200" text-anchor="middle" class="muted" font-size="10.5">unsupported / debug</text>

  <!-- Outcome cards -->
  <!-- FULL CUDA Graph (yellow tint) -->
  <g>
    <rect x="80" y="220" width="240" height="140" rx="12" class="full-fill" />
    <rect x="80" y="220" width="240" height="140" rx="12" class="full-stroke" />
    <text x="200" y="248" text-anchor="middle" class="title" font-size="13" font-weight="700">Full CUDA Graph</text>
    <text x="200" y="266" text-anchor="middle" class="muted" font-size="11">one replay per step</text>
    <line x1="96" y1="276" x2="304" y2="276" class="divider" />
    <text x="200" y="298" text-anchor="middle" class="fg mono" font-size="11">capture(forward(batch))</text>
    <text x="200" y="316" text-anchor="middle" class="muted" font-size="10.5">CPU launch cost → ~0</text>
    <text x="200" y="336" text-anchor="middle" class="muted" font-size="10.5">requires graph-friendly attention</text>
    <text x="200" y="352" text-anchor="middle" class="muted mono" font-size="10">e.g. FlashAttention 3</text>
  </g>

  <!-- Piecewise CUDA Graph (blue tint) -->
  <g>
    <rect x="360" y="220" width="240" height="140" rx="12" class="piece-fill" />
    <rect x="360" y="220" width="240" height="140" rx="12" class="piece-stroke" />
    <text x="480" y="248" text-anchor="middle" class="title" font-size="13" font-weight="700">Piecewise CUDA Graph</text>
    <text x="480" y="266" text-anchor="middle" class="muted" font-size="11">compose graph + eager region</text>
    <line x1="376" y1="276" x2="584" y2="276" class="divider" />
    <text x="480" y="298" text-anchor="middle" class="fg mono" font-size="11">graph · attention · graph</text>
    <text x="480" y="316" text-anchor="middle" class="muted" font-size="10.5">partial CPU launch saving</text>
    <text x="480" y="336" text-anchor="middle" class="muted" font-size="10.5">all backends supported</text>
    <text x="480" y="352" text-anchor="middle" class="muted mono" font-size="10">default for prefill/mixed</text>
  </g>

  <!-- Eager fallback (gray dashed) -->
  <g>
    <rect x="640" y="220" width="240" height="140" rx="12" class="eager-fill" />
    <rect x="640" y="220" width="240" height="140" rx="12" class="eager-stroke" />
    <text x="760" y="248" text-anchor="middle" class="title" font-size="13" font-weight="700">Eager (no capture)</text>
    <text x="760" y="266" text-anchor="middle" class="muted" font-size="11">every op launched on CPU</text>
    <line x1="656" y1="276" x2="864" y2="276" class="divider" />
    <text x="760" y="298" text-anchor="middle" class="fg mono" font-size="11">torch eager mode</text>
    <text x="760" y="316" text-anchor="middle" class="muted" font-size="10.5">slowest · simplest</text>
    <text x="760" y="336" text-anchor="middle" class="muted" font-size="10.5">debug / shapes off-grid</text>
    <text x="760" y="352" text-anchor="middle" class="muted mono" font-size="10">cudagraph_mode = NONE</text>
  </g>
</svg>
