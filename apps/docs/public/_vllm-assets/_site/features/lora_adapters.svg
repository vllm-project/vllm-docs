<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="LoRA adapters: one base model is loaded once on the GPU; each request picks a small adapter that overlays the base weights without copying the model.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.28; stroke-width: 1.5; fill: none; }
    .strip       { fill: #30a2ff; }
    .core-fill   { fill: #fdb517; }
    .core-stroke { stroke: #e5a315; stroke-width: 1.75; fill: none; }
    .adapter-fill   { fill: #30a2ff; fill-opacity: 0.18; }
    .adapter-stroke { stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1; fill: none; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1.5; stroke-linecap: round; fill: none; }
    .conn-dash { stroke: #30a2ff; stroke-opacity: 0.4; stroke-width: 1.25; stroke-dasharray: 4 4; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    .core-text { fill: #1c1917; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.32; }
      .core-stroke { stroke: #fbc04a; }
      .adapter-fill   { fill: #30a2ff; fill-opacity: 0.22; }
      .adapter-stroke { stroke: #30a2ff; stroke-opacity: 0.6; }
      .conn   { stroke: #30a2ff; stroke-opacity: 0.65; }
      .conn-dash { stroke: #30a2ff; stroke-opacity: 0.5; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
    <clipPath id="lc1"><rect x="30" y="230" width="200" height="110" rx="10" /></clipPath>
    <clipPath id="lc2"><rect x="250" y="230" width="200" height="110" rx="10" /></clipPath>
    <clipPath id="lc3"><rect x="470" y="230" width="200" height="110" rx="10" /></clipPath>
    <clipPath id="lc4"><rect x="690" y="230" width="240" height="110" rx="10" /></clipPath>
  </defs>

  <!-- Header -->
  <text x="480" y="36" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">LoRA ADAPTERS</text>
  <text x="480" y="58" text-anchor="middle" class="muted" font-size="12">One base model in GPU memory · many lightweight adapters · per-request adapter selection.</text>

  <!-- Base model (big yellow box, top center) -->
  <g>
    <rect x="280" y="86" width="400" height="100" rx="14" class="core-fill" />
    <rect x="280" y="86" width="400" height="100" rx="14" class="core-stroke" />
    <text x="480" y="120" text-anchor="middle" class="core-text" font-size="16" font-weight="700">Base model</text>
    <text x="480" y="142" text-anchor="middle" class="core-text mono" font-size="12" opacity="0.82">meta-llama/Llama-3-8B-Instruct</text>
    <text x="480" y="166" text-anchor="middle" class="core-text" font-size="10.5" opacity="0.7" letter-spacing="1" font-weight="600">LOADED ONCE · KEPT WARM</text>
  </g>

  <!-- Connectors to adapters -->
  <path d="M 130 230 L 130 195 L 480 195 L 480 188" class="conn-dash" />
  <path d="M 350 230 L 350 200 L 480 200 L 480 188" class="conn-dash" />
  <path d="M 570 230 L 570 200 L 480 200 L 480 188" class="conn-dash" />
  <path d="M 810 230 L 810 195 L 480 195 L 480 188" class="conn-dash" />

  <!-- Adapter row -->
  <g>
    <g clip-path="url(#lc1)">
      <rect x="30" y="230" width="200" height="110" class="card-fill" />
      <rect x="30" y="230" width="200" height="4" class="strip" />
    </g>
    <rect x="30" y="230" width="200" height="110" rx="10" class="card-stroke" />
    <text x="130" y="260" text-anchor="middle" class="title" font-size="13" font-weight="700">Adapter A</text>
    <text x="130" y="278" text-anchor="middle" class="muted" font-size="11">SQL generation</text>
    <rect x="50" y="288" width="160" height="32" rx="6" class="adapter-fill" />
    <rect x="50" y="288" width="160" height="32" rx="6" class="adapter-stroke" />
    <text x="130" y="308" text-anchor="middle" class="fg mono" font-size="10.5">rank=16 · 50 MB</text>
  </g>

  <g>
    <g clip-path="url(#lc2)">
      <rect x="250" y="230" width="200" height="110" class="card-fill" />
      <rect x="250" y="230" width="200" height="4" class="strip" />
    </g>
    <rect x="250" y="230" width="200" height="110" rx="10" class="card-stroke" />
    <text x="350" y="260" text-anchor="middle" class="title" font-size="13" font-weight="700">Adapter B</text>
    <text x="350" y="278" text-anchor="middle" class="muted" font-size="11">customer-support tone</text>
    <rect x="270" y="288" width="160" height="32" rx="6" class="adapter-fill" />
    <rect x="270" y="288" width="160" height="32" rx="6" class="adapter-stroke" />
    <text x="350" y="308" text-anchor="middle" class="fg mono" font-size="10.5">rank=8 · 25 MB</text>
  </g>

  <g>
    <g clip-path="url(#lc3)">
      <rect x="470" y="230" width="200" height="110" class="card-fill" />
      <rect x="470" y="230" width="200" height="4" class="strip" />
    </g>
    <rect x="470" y="230" width="200" height="110" rx="10" class="card-stroke" />
    <text x="570" y="260" text-anchor="middle" class="title" font-size="13" font-weight="700">Adapter C</text>
    <text x="570" y="278" text-anchor="middle" class="muted" font-size="11">code completion</text>
    <rect x="490" y="288" width="160" height="32" rx="6" class="adapter-fill" />
    <rect x="490" y="288" width="160" height="32" rx="6" class="adapter-stroke" />
    <text x="570" y="308" text-anchor="middle" class="fg mono" font-size="10.5">rank=32 · 100 MB</text>
  </g>

  <g>
    <g clip-path="url(#lc4)">
      <rect x="690" y="230" width="240" height="110" class="card-fill" />
      <rect x="690" y="230" width="240" height="4" class="strip" />
    </g>
    <rect x="690" y="230" width="240" height="110" rx="10" class="card-stroke" />
    <text x="810" y="260" text-anchor="middle" class="title" font-size="13" font-weight="700">Per-request selection</text>
    <line x1="710" y1="270" x2="910" y2="270" class="divider" />
    <text x="710" y="288" class="fg mono" font-size="10.5">LoRARequest(name, id, path)</text>
    <text x="710" y="306" class="muted" font-size="10.5">passed via <tspan class="fg mono">lora_request=</tspan></text>
    <text x="710" y="322" class="muted" font-size="10.5">to <tspan class="fg mono">llm.generate(…)</tspan></text>
  </g>
</svg>
