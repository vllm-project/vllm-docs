<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="Multimodal inputs in vLLM: text, images, audio, and video go through modality-specific encoders to produce embeddings; those are merged with the text token stream and fed to the LLM decoder, which generates text.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.28; stroke-width: 1.5; fill: none; }
    .strip       { fill: #30a2ff; }
    .core-fill   { fill: #fdb517; }
    .core-stroke { stroke: #e5a315; stroke-width: 1.75; fill: none; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1.75; stroke-linecap: round; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    .core-text { fill: #1c1917; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.32; }
      .core-stroke { stroke: #fbc04a; }
      .conn   { stroke: #30a2ff; stroke-opacity: 0.65; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
    <clipPath id="mm1"><rect x="30"  y="90" width="180" height="64" rx="8" /></clipPath>
    <clipPath id="mm2"><rect x="30" y="158" width="180" height="64" rx="8" /></clipPath>
    <clipPath id="mm3"><rect x="30" y="226" width="180" height="64" rx="8" /></clipPath>
    <clipPath id="mm4"><rect x="30" y="294" width="180" height="64" rx="8" /></clipPath>
    <clipPath id="mmo"><rect x="790" y="158" width="140" height="120" rx="10" /></clipPath>
  </defs>

  <!-- Header -->
  <text x="480" y="36" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">MULTIMODAL INPUTS</text>
  <text x="480" y="58" text-anchor="middle" class="muted" font-size="12">Each modality has its own encoder · embeddings are merged with text tokens · the LLM decodes as usual.</text>

  <!-- Four modality inputs -->
  <g>
    <g clip-path="url(#mm1)">
      <rect x="30" y="90" width="180" height="64" class="card-fill" />
      <rect x="30" y="90" width="180" height="4" class="strip" />
    </g>
    <rect x="30" y="90" width="180" height="64" rx="8" class="card-stroke" />
    <text x="48" y="118" class="title" font-size="12.5" font-weight="700">Text prompt</text>
    <text x="48" y="138" class="muted mono" font-size="10.5">"Describe this image…"</text>
  </g>

  <g>
    <g clip-path="url(#mm2)">
      <rect x="30" y="158" width="180" height="64" class="card-fill" />
      <rect x="30" y="158" width="180" height="4" class="strip" />
    </g>
    <rect x="30" y="158" width="180" height="64" rx="8" class="card-stroke" />
    <text x="48" y="186" class="title" font-size="12.5" font-weight="700">Image</text>
    <text x="48" y="206" class="muted mono" font-size="10.5">PIL · URL · base64</text>
  </g>

  <g>
    <g clip-path="url(#mm3)">
      <rect x="30" y="226" width="180" height="64" class="card-fill" />
      <rect x="30" y="226" width="180" height="4" class="strip" />
    </g>
    <rect x="30" y="226" width="180" height="64" rx="8" class="card-stroke" />
    <text x="48" y="254" class="title" font-size="12.5" font-weight="700">Audio</text>
    <text x="48" y="274" class="muted mono" font-size="10.5">wav · mp3 · streaming</text>
  </g>

  <g>
    <g clip-path="url(#mm4)">
      <rect x="30" y="294" width="180" height="64" class="card-fill" />
      <rect x="30" y="294" width="180" height="4" class="strip" />
    </g>
    <rect x="30" y="294" width="180" height="64" rx="8" class="card-stroke" />
    <text x="48" y="322" class="title" font-size="12.5" font-weight="700">Video</text>
    <text x="48" y="342" class="muted mono" font-size="10.5">frames · clip</text>
  </g>

  <!-- Arrows to encoders -->
  <path d="M 212 122 L 290 122" class="conn" marker-end="url(#arr)" />
  <path d="M 212 190 L 290 190" class="conn" marker-end="url(#arr)" />
  <path d="M 212 258 L 290 258" class="conn" marker-end="url(#arr)" />
  <path d="M 212 326 L 290 326" class="conn" marker-end="url(#arr)" />

  <!-- Encoders column (small blue cards) -->
  <g>
    <rect x="292" y="98" width="156" height="48" rx="8" class="card-fill" />
    <rect x="292" y="98" width="156" height="48" rx="8" class="card-stroke" />
    <text x="370" y="118" text-anchor="middle" class="fg" font-size="11.5" font-weight="600">Tokenizer</text>
    <text x="370" y="134" text-anchor="middle" class="muted mono" font-size="10">text → token IDs</text>

    <rect x="292" y="166" width="156" height="48" rx="8" class="card-fill" />
    <rect x="292" y="166" width="156" height="48" rx="8" class="card-stroke" />
    <text x="370" y="186" text-anchor="middle" class="fg" font-size="11.5" font-weight="600">Vision encoder</text>
    <text x="370" y="202" text-anchor="middle" class="muted mono" font-size="10">ViT · SigLIP · …</text>

    <rect x="292" y="234" width="156" height="48" rx="8" class="card-fill" />
    <rect x="292" y="234" width="156" height="48" rx="8" class="card-stroke" />
    <text x="370" y="254" text-anchor="middle" class="fg" font-size="11.5" font-weight="600">Audio encoder</text>
    <text x="370" y="270" text-anchor="middle" class="muted mono" font-size="10">Whisper · Voxtral · …</text>

    <rect x="292" y="302" width="156" height="48" rx="8" class="card-fill" />
    <rect x="292" y="302" width="156" height="48" rx="8" class="card-stroke" />
    <text x="370" y="322" text-anchor="middle" class="fg" font-size="11.5" font-weight="600">Video frames</text>
    <text x="370" y="338" text-anchor="middle" class="muted mono" font-size="10">subsampled → vision</text>
  </g>

  <!-- Arrows from encoders into fusion -->
  <path d="M 450 122 C 510 122 510 200 568 200" class="conn" marker-end="url(#arr)" />
  <path d="M 450 190 L 568 200" class="conn" marker-end="url(#arr)" />
  <path d="M 450 258 L 568 220" class="conn" marker-end="url(#arr)" />
  <path d="M 450 326 C 510 326 510 230 568 230" class="conn" marker-end="url(#arr)" />

  <!-- Fusion (yellow focal point) -->
  <g>
    <rect x="570" y="158" width="190" height="120" rx="14" class="core-fill" />
    <rect x="570" y="158" width="190" height="120" rx="14" class="core-stroke" />
    <text x="665" y="190" text-anchor="middle" class="core-text" font-size="14" font-weight="700">LLM decoder</text>
    <text x="665" y="208" text-anchor="middle" class="core-text" font-size="11" opacity="0.8">merge embeds · interleave</text>
    <text x="665" y="226" text-anchor="middle" class="core-text" font-size="11" opacity="0.8">with text tokens</text>
    <text x="665" y="252" text-anchor="middle" class="core-text mono" font-size="10.5" opacity="0.74">Llava · Qwen-VL · Pixtral · …</text>
    <text x="665" y="270" text-anchor="middle" class="core-text" font-size="10" opacity="0.7" letter-spacing="1" font-weight="600">SHARED KV CACHE</text>
  </g>

  <!-- Arrow to output -->
  <path d="M 762 218 L 786 218" class="conn" marker-end="url(#arr)" />

  <!-- Output -->
  <g>
    <g clip-path="url(#mmo)">
      <rect x="790" y="158" width="140" height="120" class="card-fill" />
      <rect x="790" y="158" width="140" height="4" class="strip" />
    </g>
    <rect x="790" y="158" width="140" height="120" rx="10" class="card-stroke" />
    <text x="860" y="186" text-anchor="middle" class="title" font-size="13" font-weight="700">Text out</text>
    <line x1="806" y1="198" x2="914" y2="198" class="divider" />
    <text x="860" y="220" text-anchor="middle" class="fg" font-size="11">caption · answer</text>
    <text x="860" y="238" text-anchor="middle" class="fg" font-size="11">transcript · …</text>
    <text x="860" y="262" text-anchor="middle" class="muted" font-size="10.5">streaming · structured</text>
  </g>
</svg>
