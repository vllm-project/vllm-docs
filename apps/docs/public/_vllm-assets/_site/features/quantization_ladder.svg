<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="Quantization formats in vLLM, organised by precision tier — 16-bit baseline, 8-bit (FP8 and INT8 W8A8), and 4-bit (AWQ, GPTQ, INT4 W4A16, BitsAndBytes). Lower bits = less GPU memory and faster inference, at some quality cost.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.28; stroke-width: 1.5; fill: none; }
    .strip       { fill: #30a2ff; }
    .core-fill   { fill: #fdb517; }
    .core-stroke { stroke: #e5a315; stroke-width: 1.5; fill: none; }
    .pill-fill   { fill: #30a2ff; fill-opacity: 0.18; }
    .pill-stroke { stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1; fill: none; }
    .baseline-fill { fill: #fdb517; fill-opacity: 0.4; }
    .baseline-stroke { stroke: #e5a315; stroke-width: 1; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.32; }
      .core-stroke { stroke: #fbc04a; }
      .pill-fill   { fill: #30a2ff; fill-opacity: 0.22; }
      .pill-stroke { stroke: #30a2ff; stroke-opacity: 0.6; }
      .baseline-fill { fill: #fdb517; fill-opacity: 0.3; }
      .baseline-stroke { stroke: #fbc04a; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <clipPath id="qt1"><rect x="30" y="92" width="900" height="86" rx="12" /></clipPath>
    <clipPath id="qt2"><rect x="30" y="194" width="900" height="86" rx="12" /></clipPath>
    <clipPath id="qt3"><rect x="30" y="296" width="900" height="86" rx="12" /></clipPath>
  </defs>

  <!-- Header -->
  <text x="480" y="36" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">QUANTIZATION FORMATS</text>
  <text x="480" y="58" text-anchor="middle" class="muted" font-size="12">Lower bits → smaller weights / faster matmul / wider hardware support · pick by your accuracy budget.</text>

  <!-- Left rail: y-axis "memory footprint" -->
  <text x="60" y="80" class="muted" font-size="10.5" letter-spacing="1.5" font-weight="600">MEMORY ↓ · BITS ↓</text>

  <!-- Tier 1: FP16 baseline -->
  <g>
    <g clip-path="url(#qt1)">
      <rect x="30" y="92" width="900" height="86" class="card-fill" />
      <rect x="30" y="92" width="900" height="4" class="strip" />
    </g>
    <rect x="30" y="92" width="900" height="86" rx="12" class="card-stroke" />
    <text x="48" y="124" class="title" font-size="14" font-weight="700">16-bit · baseline</text>
    <text x="48" y="144" class="muted" font-size="11">FP16 / BF16 · accuracy reference, full memory budget</text>
    <text x="48" y="164" class="muted mono" font-size="11">1.00× model size</text>
    <!-- Format pill -->
    <rect x="320" y="116" width="120" height="46" rx="10" class="baseline-fill" />
    <rect x="320" y="116" width="120" height="46" rx="10" class="baseline-stroke" />
    <text x="380" y="136" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">FP16 / BF16</text>
    <text x="380" y="154" text-anchor="middle" class="muted" font-size="10.5">unquantized</text>
  </g>

  <!-- Tier 2: 8-bit -->
  <g>
    <g clip-path="url(#qt2)">
      <rect x="30" y="194" width="900" height="86" class="card-fill" />
      <rect x="30" y="194" width="900" height="4" class="strip" />
    </g>
    <rect x="30" y="194" width="900" height="86" rx="12" class="card-stroke" />
    <text x="48" y="226" class="title" font-size="14" font-weight="700">8-bit</text>
    <text x="48" y="246" class="muted" font-size="11">weights + activations both shrink · best accuracy/memory trade-off</text>
    <text x="48" y="266" class="muted mono" font-size="11">~0.50× model size</text>
    <!-- Pills: FP8 W8A8 · INT8 W8A8 · Quantized KV-cache -->
    <rect x="320" y="218" width="120" height="46" rx="10" class="pill-fill" />
    <rect x="320" y="218" width="120" height="46" rx="10" class="pill-stroke" />
    <text x="380" y="238" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">FP8 W8A8</text>
    <text x="380" y="256" text-anchor="middle" class="muted" font-size="10.5">H100 · ModelOpt</text>

    <rect x="455" y="218" width="120" height="46" rx="10" class="pill-fill" />
    <rect x="455" y="218" width="120" height="46" rx="10" class="pill-stroke" />
    <text x="515" y="238" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">INT8 W8A8</text>
    <text x="515" y="256" text-anchor="middle" class="muted" font-size="10.5">smoothquant</text>

    <rect x="590" y="218" width="160" height="46" rx="10" class="pill-fill" />
    <rect x="590" y="218" width="160" height="46" rx="10" class="pill-stroke" />
    <text x="670" y="238" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">Quantized KV-cache</text>
    <text x="670" y="256" text-anchor="middle" class="muted" font-size="10.5">FP8 / INT8 KV</text>

    <rect x="765" y="218" width="150" height="46" rx="10" class="pill-fill" />
    <rect x="765" y="218" width="150" height="46" rx="10" class="pill-stroke" />
    <text x="840" y="238" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">FP8 ViT-attn</text>
    <text x="840" y="256" text-anchor="middle" class="muted" font-size="10.5">multimodal encoders</text>
  </g>

  <!-- Tier 3: 4-bit -->
  <g>
    <g clip-path="url(#qt3)">
      <rect x="30" y="296" width="900" height="86" class="card-fill" />
      <rect x="30" y="296" width="900" height="4" class="strip" />
    </g>
    <rect x="30" y="296" width="900" height="86" rx="12" class="card-stroke" />
    <text x="48" y="328" class="title" font-size="14" font-weight="700">4-bit · weight-only</text>
    <text x="48" y="348" class="muted" font-size="11">weights compressed · activations stay 16-bit · largest memory savings</text>
    <text x="48" y="368" class="muted mono" font-size="11">~0.25× model size</text>
    <rect x="320" y="320" width="110" height="46" rx="10" class="pill-fill" />
    <rect x="320" y="320" width="110" height="46" rx="10" class="pill-stroke" />
    <text x="375" y="340" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">AWQ</text>
    <text x="375" y="358" text-anchor="middle" class="muted" font-size="10.5">AutoAWQ</text>

    <rect x="440" y="320" width="110" height="46" rx="10" class="pill-fill" />
    <rect x="440" y="320" width="110" height="46" rx="10" class="pill-stroke" />
    <text x="495" y="340" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">GPTQ</text>
    <text x="495" y="358" text-anchor="middle" class="muted" font-size="10.5">GPTQModel</text>

    <rect x="560" y="320" width="110" height="46" rx="10" class="pill-fill" />
    <rect x="560" y="320" width="110" height="46" rx="10" class="pill-stroke" />
    <text x="615" y="340" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">INT4 W4A16</text>
    <text x="615" y="358" text-anchor="middle" class="muted" font-size="10.5">LLM Compressor</text>

    <rect x="680" y="320" width="110" height="46" rx="10" class="pill-fill" />
    <rect x="680" y="320" width="110" height="46" rx="10" class="pill-stroke" />
    <text x="735" y="340" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">BnB NF4</text>
    <text x="735" y="358" text-anchor="middle" class="muted" font-size="10.5">BitsAndBytes</text>

    <rect x="800" y="320" width="110" height="46" rx="10" class="pill-fill" />
    <rect x="800" y="320" width="110" height="46" rx="10" class="pill-stroke" />
    <text x="855" y="340" text-anchor="middle" class="fg mono" font-size="12" font-weight="700">GGUF</text>
    <text x="855" y="358" text-anchor="middle" class="muted" font-size="10.5">llama.cpp-style</text>
  </g>
</svg>
