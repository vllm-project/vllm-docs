<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="Speculative decoding: a small draft model proposes k tokens ahead; the larger target model verifies them in one forward pass and accepts the longest agreeing prefix, advancing more than one token per step.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.28; stroke-width: 1.5; fill: none; }
    .strip       { fill: #30a2ff; }
    .core-fill   { fill: #fdb517; }
    .core-stroke { stroke: #e5a315; stroke-width: 1.75; fill: none; }
    .draft-fill  { fill: #30a2ff; fill-opacity: 0.2; }
    .draft-stroke{ stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1.25; fill: none; }
    .accept-fill { fill: #fdb517; fill-opacity: 0.55; }
    .accept-stroke{ stroke: #e5a315; stroke-width: 1; fill: none; }
    .reject-fill { fill: #fee2e2; }
    .reject-stroke{ stroke: #ef4444; stroke-opacity: 0.55; stroke-width: 1; fill: none; }
    .discard-fill{ fill: #ffffff; fill-opacity: 0; }
    .discard-stroke{ stroke: #94a3b8; stroke-opacity: 0.45; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1.75; stroke-linecap: round; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    .core-text { fill: #1c1917; }
    .reject-text { fill: #b91c1c; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.32; }
      .core-stroke { stroke: #fbc04a; }
      .draft-fill  { fill: #30a2ff; fill-opacity: 0.25; }
      .draft-stroke{ stroke: #30a2ff; stroke-opacity: 0.6; }
      .accept-fill { fill: #fdb517; fill-opacity: 0.45; }
      .accept-stroke{ stroke: #fbc04a; }
      .reject-fill { fill: #7f1d1d; fill-opacity: 0.45; }
      .reject-stroke{ stroke: #f87171; stroke-opacity: 0.7; }
      .discard-stroke{ stroke: #475569; stroke-opacity: 0.5; }
      .conn   { stroke: #30a2ff; stroke-opacity: 0.65; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
      .reject-text { fill: #fca5a5; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
  </defs>

  <!-- Header -->
  <text x="480" y="36" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">SPECULATIVE DECODING</text>
  <text x="480" y="58" text-anchor="middle" class="muted" font-size="12">Trade one extra small forward for many fewer large forwards — accept the longest agreeing prefix per step.</text>

  <!-- Draft model -->
  <g>
    <rect x="30" y="100" width="220" height="92" rx="12" class="card-fill" />
    <rect x="30" y="100" width="220" height="92" rx="12" class="card-stroke" />
    <rect x="30" y="100" width="220" height="4" class="strip" />
    <text x="140" y="132" text-anchor="middle" class="title" font-size="14" font-weight="700">Draft model</text>
    <text x="140" y="152" text-anchor="middle" class="muted" font-size="11">small · cheap · k tokens / step</text>
    <text x="140" y="174" text-anchor="middle" class="fg mono" font-size="11">EAGLE · MTP · n-gram · …</text>
  </g>

  <!-- Arrow draft → proposals -->
  <path d="M 256 146 L 326 146" class="conn" marker-end="url(#arr)" />
  <text x="291" y="138" text-anchor="middle" class="muted" font-size="10">proposes</text>

  <!-- Proposed token strip -->
  <text x="500" y="98" text-anchor="middle" class="muted" font-size="11" letter-spacing="1">PROPOSED TOKENS · k = 5</text>
  <g>
    <rect x="338" y="110" width="68" height="72" rx="6" class="draft-fill" />
    <rect x="338" y="110" width="68" height="72" rx="6" class="draft-stroke" />
    <text x="372" y="142" text-anchor="middle" class="fg mono" font-size="11">t+1</text>
    <text x="372" y="166" text-anchor="middle" class="muted" font-size="10">"the"</text>

    <rect x="414" y="110" width="68" height="72" rx="6" class="draft-fill" />
    <rect x="414" y="110" width="68" height="72" rx="6" class="draft-stroke" />
    <text x="448" y="142" text-anchor="middle" class="fg mono" font-size="11">t+2</text>
    <text x="448" y="166" text-anchor="middle" class="muted" font-size="10">"quick"</text>

    <rect x="490" y="110" width="68" height="72" rx="6" class="draft-fill" />
    <rect x="490" y="110" width="68" height="72" rx="6" class="draft-stroke" />
    <text x="524" y="142" text-anchor="middle" class="fg mono" font-size="11">t+3</text>
    <text x="524" y="166" text-anchor="middle" class="muted" font-size="10">"brown"</text>

    <rect x="566" y="110" width="68" height="72" rx="6" class="draft-fill" />
    <rect x="566" y="110" width="68" height="72" rx="6" class="draft-stroke" />
    <text x="600" y="142" text-anchor="middle" class="fg mono" font-size="11">t+4</text>
    <text x="600" y="166" text-anchor="middle" class="muted" font-size="10">"cat"</text>

    <rect x="642" y="110" width="68" height="72" rx="6" class="draft-fill" />
    <rect x="642" y="110" width="68" height="72" rx="6" class="draft-stroke" />
    <text x="676" y="142" text-anchor="middle" class="fg mono" font-size="11">t+5</text>
    <text x="676" y="166" text-anchor="middle" class="muted" font-size="10">"sat"</text>
  </g>

  <!-- Arrow proposals → target -->
  <path d="M 716 146 L 778 146" class="conn" marker-end="url(#arr)" />
  <text x="747" y="138" text-anchor="middle" class="muted" font-size="10">one forward</text>

  <!-- Target model (yellow focal) -->
  <g>
    <rect x="780" y="98" width="160" height="96" rx="14" class="core-fill" />
    <rect x="780" y="98" width="160" height="96" rx="14" class="core-stroke" />
    <text x="860" y="132" text-anchor="middle" class="core-text" font-size="14" font-weight="700">Target model</text>
    <text x="860" y="154" text-anchor="middle" class="core-text" font-size="11" opacity="0.8">large · 1 verification</text>
    <text x="860" y="178" text-anchor="middle" class="core-text mono" font-size="10.5" opacity="0.78">verify k tokens at once</text>
  </g>

  <!-- Verdict row -->
  <text x="500" y="234" text-anchor="middle" class="muted" font-size="11" letter-spacing="1">VERDICT · ACCEPT THE LONGEST AGREEING PREFIX</text>
  <g>
    <rect x="338" y="246" width="68" height="60" rx="6" class="accept-fill" />
    <rect x="338" y="246" width="68" height="60" rx="6" class="accept-stroke" />
    <text x="372" y="272" text-anchor="middle" class="fg mono" font-size="11" font-weight="600">accept</text>
    <text x="372" y="292" text-anchor="middle" class="muted" font-size="10">"the"</text>

    <rect x="414" y="246" width="68" height="60" rx="6" class="accept-fill" />
    <rect x="414" y="246" width="68" height="60" rx="6" class="accept-stroke" />
    <text x="448" y="272" text-anchor="middle" class="fg mono" font-size="11" font-weight="600">accept</text>
    <text x="448" y="292" text-anchor="middle" class="muted" font-size="10">"quick"</text>

    <rect x="490" y="246" width="68" height="60" rx="6" class="accept-fill" />
    <rect x="490" y="246" width="68" height="60" rx="6" class="accept-stroke" />
    <text x="524" y="272" text-anchor="middle" class="fg mono" font-size="11" font-weight="600">accept</text>
    <text x="524" y="292" text-anchor="middle" class="muted" font-size="10">"brown"</text>

    <rect x="566" y="246" width="68" height="60" rx="6" class="reject-fill" />
    <rect x="566" y="246" width="68" height="60" rx="6" class="reject-stroke" />
    <text x="600" y="272" text-anchor="middle" class="reject-text mono" font-size="11" font-weight="600">reject</text>
    <text x="600" y="292" text-anchor="middle" class="muted" font-size="10">"fox" not "cat"</text>

    <rect x="642" y="246" width="68" height="60" rx="6" class="discard-fill" />
    <rect x="642" y="246" width="68" height="60" rx="6" class="discard-stroke" />
    <text x="676" y="272" text-anchor="middle" class="muted mono" font-size="11">discard</text>
    <text x="676" y="292" text-anchor="middle" class="muted" font-size="10">tail dropped</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="332" x2="900" y2="332" class="divider" />
  <text x="60" y="354" class="muted" font-size="11.5">Per step: <tspan class="fg" font-weight="600">3 tokens emitted</tspan> for the cost of <tspan class="title" font-weight="600">1 target forward + 1 draft forward</tspan> — biggest win at low QPS / memory-bound decode.</text>
</svg>
