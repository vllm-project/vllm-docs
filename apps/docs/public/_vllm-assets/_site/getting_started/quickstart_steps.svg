<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-label="vLLM quickstart in three steps: install via pip or uv; launch a server with vllm serve and a Hugging Face model id; query it from any OpenAI-compatible client.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .card-fill   { fill: #ffffff; }
    .card-stroke { stroke: #30a2ff; stroke-opacity: 0.35; stroke-width: 1.5; fill: none; }
    .num-fill   { fill: #fdb517; }
    .num-stroke { stroke: #e5a315; stroke-width: 1.5; fill: none; }
    .num-text   { fill: #1c1917; }
    .code-fill  { fill: #30a2ff; fill-opacity: 0.09; }
    .code-stroke{ stroke: #30a2ff; stroke-opacity: 0.4; stroke-width: 1; fill: none; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1.75; stroke-linecap: round; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    @media (prefers-color-scheme: dark) {
      .card-fill   { fill: #0f172a; }
      .card-stroke { stroke: #30a2ff; stroke-opacity: 0.45; }
      .num-stroke { stroke: #fbc04a; }
      .code-fill  { fill: #30a2ff; fill-opacity: 0.14; }
      .code-stroke{ stroke: #30a2ff; stroke-opacity: 0.5; }
      .conn   { stroke: #30a2ff; stroke-opacity: 0.6; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
  </defs>

  <!-- Header -->
  <text x="480" y="32" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">QUICKSTART · INSTALL · SERVE · QUERY</text>

  <!-- Step 1 -->
  <g>
    <!-- Big number circle, half-outside the card -->
    <circle cx="60" cy="86" r="28" class="num-fill" />
    <circle cx="60" cy="86" r="28" class="num-stroke" />
    <text x="60" y="96" text-anchor="middle" class="num-text" font-size="22" font-weight="800">1</text>
    <rect x="40" y="120" width="280" height="200" rx="14" class="card-fill" />
    <rect x="40" y="120" width="280" height="200" rx="14" class="card-stroke" />
    <text x="60" y="150" class="title" font-size="14" font-weight="700">Install</text>
    <text x="60" y="170" class="muted" font-size="11">one of: pip · uv · docker</text>
    <rect x="56" y="184" width="248" height="58" rx="6" class="code-fill" />
    <rect x="56" y="184" width="248" height="58" rx="6" class="code-stroke" />
    <text x="68" y="206" class="fg mono" font-size="11">uv venv --python 3.12</text>
    <text x="68" y="222" class="fg mono" font-size="11">source .venv/bin/activate</text>
    <text x="68" y="238" class="fg mono" font-size="11">uv pip install vllm</text>
    <text x="60" y="266" class="muted" font-size="10.5">— or —</text>
    <text x="60" y="284" class="fg mono" font-size="11">pip install vllm</text>
    <text x="60" y="306" class="muted" font-size="10.5">CUDA / ROCm / CPU wheels auto-selected.</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path d="M 322 220 L 358 220" class="conn" marker-end="url(#arr)" />

  <!-- Step 2 -->
  <g>
    <circle cx="380" cy="86" r="28" class="num-fill" />
    <circle cx="380" cy="86" r="28" class="num-stroke" />
    <text x="380" y="96" text-anchor="middle" class="num-text" font-size="22" font-weight="800">2</text>
    <rect x="360" y="120" width="280" height="200" rx="14" class="card-fill" />
    <rect x="360" y="120" width="280" height="200" rx="14" class="card-stroke" />
    <text x="380" y="150" class="title" font-size="14" font-weight="700">Serve</text>
    <text x="380" y="170" class="muted" font-size="11">start the OpenAI-compatible server</text>
    <rect x="376" y="184" width="248" height="58" rx="6" class="code-fill" />
    <rect x="376" y="184" width="248" height="58" rx="6" class="code-stroke" />
    <text x="388" y="206" class="fg mono" font-size="11">vllm serve \</text>
    <text x="388" y="222" class="fg mono" font-size="11">  meta-llama/Llama-3.2-1B-Instruct</text>
    <text x="388" y="238" class="muted mono" font-size="10.5"># downloads weights from HF · binds :8000</text>
    <text x="380" y="266" class="muted" font-size="10.5">Listens on <tspan class="fg mono">http://localhost:8000/v1</tspan></text>
    <text x="380" y="284" class="muted" font-size="10.5">Health: <tspan class="fg mono">GET /health</tspan></text>
    <text x="380" y="306" class="muted" font-size="10.5">Metrics: <tspan class="fg mono">GET /metrics</tspan></text>
  </g>

  <!-- Arrow 2 → 3 -->
  <path d="M 642 220 L 678 220" class="conn" marker-end="url(#arr)" />

  <!-- Step 3 -->
  <g>
    <circle cx="700" cy="86" r="28" class="num-fill" />
    <circle cx="700" cy="86" r="28" class="num-stroke" />
    <text x="700" y="96" text-anchor="middle" class="num-text" font-size="22" font-weight="800">3</text>
    <rect x="680" y="120" width="240" height="200" rx="14" class="card-fill" />
    <rect x="680" y="120" width="240" height="200" rx="14" class="card-stroke" />
    <text x="700" y="150" class="title" font-size="14" font-weight="700">Query</text>
    <text x="700" y="170" class="muted" font-size="11">any OpenAI client speaks to it</text>
    <rect x="696" y="184" width="208" height="58" rx="6" class="code-fill" />
    <rect x="696" y="184" width="208" height="58" rx="6" class="code-stroke" />
    <text x="708" y="206" class="fg mono" font-size="10.5">curl localhost:8000/v1/\</text>
    <text x="708" y="222" class="fg mono" font-size="10.5">chat/completions \</text>
    <text x="708" y="238" class="fg mono" font-size="10.5">  -d '{"model": "...", ...}'</text>
    <text x="700" y="266" class="muted" font-size="10.5">— or —</text>
    <text x="700" y="284" class="fg mono" font-size="11">openai.ChatCompletion.create(...)</text>
    <text x="700" y="306" class="muted" font-size="10.5">same request shape as OpenAI.</text>
  </g>
</svg>
