<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-label="Asynchronous reinforcement learning timeline: a generation coroutine running on vLLM and a training coroutine running on the trainer execute in parallel. The trainer periodically calls pause_generation, syncs new weights, then resume_generation so rollouts pick up with the fresh policy. While one half is busy, the other half is doing useful work.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .lane-bg { fill: #ffffff; stroke: #30a2ff; stroke-opacity: 0.3; stroke-width: 1; }
    .axis-line { stroke: #30a2ff; stroke-opacity: 0.35; stroke-width: 1; fill: none; }
    .axis-tick { stroke: #30a2ff; stroke-opacity: 0.4; stroke-width: 1; fill: none; }
    .gen-fill   { fill: #fdb517; fill-opacity: 0.55; }
    .gen-stroke { stroke: #e5a315; stroke-width: 1; fill: none; }
    .train-fill   { fill: #30a2ff; fill-opacity: 0.22; }
    .train-stroke { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1; fill: none; }
    .pause-fill   { fill: #94a3b8; fill-opacity: 0.22; }
    .pause-stroke { stroke: #94a3b8; stroke-opacity: 0.55; stroke-width: 1; stroke-dasharray: 3 2; fill: none; }
    .sync-stroke { stroke: #e5a315; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .arrow-sync { fill: #e5a315; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    @media (prefers-color-scheme: dark) {
      .lane-bg { fill: #0f172a; stroke: #30a2ff; stroke-opacity: 0.4; }
      .axis-line { stroke: #30a2ff; stroke-opacity: 0.4; }
      .axis-tick { stroke: #30a2ff; stroke-opacity: 0.45; }
      .gen-fill   { fill: #fdb517; fill-opacity: 0.45; }
      .gen-stroke { stroke: #fbc04a; }
      .train-fill { fill: #30a2ff; fill-opacity: 0.3; }
      .train-stroke { stroke: #30a2ff; stroke-opacity: 0.65; }
      .pause-fill { fill: #475569; fill-opacity: 0.5; }
      .pause-stroke{ stroke: #94a3b8; stroke-opacity: 0.6; }
      .sync-stroke { stroke: #fbc04a; }
      .arrow-sync { fill: #fbc04a; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="sarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-sync" />
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">ASYNC RL · GENERATION AND TRAINING PIPELINED</text>

  <!-- Lane labels -->
  <text x="40" y="98" class="title" font-size="11" font-weight="700" letter-spacing="1">vLLM lane</text>
  <text x="40" y="114" class="muted" font-size="10.5">rollout coroutine</text>

  <text x="40" y="208" class="title" font-size="11" font-weight="700" letter-spacing="1">Trainer lane</text>
  <text x="40" y="224" class="muted" font-size="10.5">optimiser coroutine</text>

  <!-- Time axis -->
  <line x1="160" y1="306" x2="920" y2="306" class="axis-line" />
  <g>
    <line x1="160" y1="306" x2="160" y2="312" class="axis-tick" />
    <text x="160" y="326" text-anchor="middle" class="muted mono" font-size="10">t₀</text>
    <line x1="350" y1="306" x2="350" y2="312" class="axis-tick" />
    <text x="350" y="326" text-anchor="middle" class="muted mono" font-size="10">t₁</text>
    <line x1="540" y1="306" x2="540" y2="312" class="axis-tick" />
    <text x="540" y="326" text-anchor="middle" class="muted mono" font-size="10">t₂</text>
    <line x1="730" y1="306" x2="730" y2="312" class="axis-tick" />
    <text x="730" y="326" text-anchor="middle" class="muted mono" font-size="10">t₃</text>
    <line x1="920" y1="306" x2="920" y2="312" class="axis-tick" />
    <text x="920" y="326" text-anchor="middle" class="muted mono" font-size="10">t₄</text>
  </g>
  <text x="540" y="346" text-anchor="middle" class="muted" font-size="10.5" letter-spacing="1">WALL-CLOCK TIME →</text>

  <!-- vLLM lane background -->
  <rect x="160" y="80" width="760" height="68" rx="8" class="lane-bg" />

  <!-- vLLM activity blocks: generate / pause / generate -->
  <rect x="168" y="88" width="170" height="52" rx="6" class="gen-fill" />
  <rect x="168" y="88" width="170" height="52" rx="6" class="gen-stroke" />
  <text x="253" y="110" text-anchor="middle" class="fg" font-size="11" font-weight="600">generate (rollout)</text>
  <text x="253" y="126" text-anchor="middle" class="muted" font-size="10">policy v₀</text>

  <rect x="346" y="88" width="40" height="52" rx="6" class="pause-fill" />
  <rect x="346" y="88" width="40" height="52" rx="6" class="pause-stroke" />
  <text x="366" y="118" text-anchor="middle" class="muted mono" font-size="9">pause</text>

  <rect x="394" y="88" width="158" height="52" rx="6" class="gen-fill" />
  <rect x="394" y="88" width="158" height="52" rx="6" class="gen-stroke" />
  <text x="473" y="110" text-anchor="middle" class="fg" font-size="11" font-weight="600">generate (rollout)</text>
  <text x="473" y="126" text-anchor="middle" class="muted" font-size="10">policy v₁</text>

  <rect x="560" y="88" width="40" height="52" rx="6" class="pause-fill" />
  <rect x="560" y="88" width="40" height="52" rx="6" class="pause-stroke" />
  <text x="580" y="118" text-anchor="middle" class="muted mono" font-size="9">pause</text>

  <rect x="608" y="88" width="312" height="52" rx="6" class="gen-fill" />
  <rect x="608" y="88" width="312" height="52" rx="6" class="gen-stroke" />
  <text x="764" y="110" text-anchor="middle" class="fg" font-size="11" font-weight="600">generate (rollout)</text>
  <text x="764" y="126" text-anchor="middle" class="muted" font-size="10">policy v₂</text>

  <!-- Trainer lane background -->
  <rect x="160" y="190" width="760" height="68" rx="8" class="lane-bg" />

  <!-- Trainer activity blocks: idle / train / sync / train / sync / train -->
  <rect x="168" y="198" width="170" height="52" rx="6" class="train-fill" />
  <rect x="168" y="198" width="170" height="52" rx="6" class="train-stroke" />
  <text x="253" y="220" text-anchor="middle" class="fg" font-size="11" font-weight="600">train on batch B₀</text>
  <text x="253" y="236" text-anchor="middle" class="muted" font-size="10">prev rollouts</text>

  <rect x="346" y="198" width="40" height="52" rx="6" class="pause-fill" />
  <rect x="346" y="198" width="40" height="52" rx="6" class="pause-stroke" />
  <text x="366" y="228" text-anchor="middle" class="muted mono" font-size="9">sync</text>

  <rect x="394" y="198" width="158" height="52" rx="6" class="train-fill" />
  <rect x="394" y="198" width="158" height="52" rx="6" class="train-stroke" />
  <text x="473" y="220" text-anchor="middle" class="fg" font-size="11" font-weight="600">train on batch B₁</text>
  <text x="473" y="236" text-anchor="middle" class="muted" font-size="10">just rolled out</text>

  <rect x="560" y="198" width="40" height="52" rx="6" class="pause-fill" />
  <rect x="560" y="198" width="40" height="52" rx="6" class="pause-stroke" />
  <text x="580" y="228" text-anchor="middle" class="muted mono" font-size="9">sync</text>

  <rect x="608" y="198" width="312" height="52" rx="6" class="train-fill" />
  <rect x="608" y="198" width="312" height="52" rx="6" class="train-stroke" />
  <text x="764" y="220" text-anchor="middle" class="fg" font-size="11" font-weight="600">train on batch B₂ · already filling B₃</text>
  <text x="764" y="236" text-anchor="middle" class="muted" font-size="10">overlapping with rollout B₃</text>

  <!-- Weight sync vertical arrows trainer → vLLM during pause windows -->
  <path d="M 366 196 L 366 142" class="sync-stroke" marker-end="url(#sarr)" />
  <path d="M 580 196 L 580 142" class="sync-stroke" marker-end="url(#sarr)" />
  <text x="386" y="170" class="muted" font-size="10" font-weight="600">weight sync</text>
  <text x="600" y="170" class="muted" font-size="10" font-weight="600">weight sync</text>

  <!-- Pause/Resume labels under vLLM lane between sync points -->
  <text x="366" y="160" text-anchor="middle" class="muted mono" font-size="9">pause(mode=keep)</text>
  <text x="580" y="160" text-anchor="middle" class="muted mono" font-size="9">pause(mode=keep)</text>
</svg>
