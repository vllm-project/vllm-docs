<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="Weight transfer backends in vLLM: a pluggable four-phase protocol moves freshly-trained weights from the trainer process into the inference engine. NCCL broadcast handles the case where training and inference live on separate GPUs; CUDA IPC handles handle colocated training and inference sharing the same GPU.">
  <style>
    text { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .panel-bg     { fill: #30a2ff; fill-opacity: 0.06; }
    .panel-stroke { stroke: #30a2ff; stroke-opacity: 0.5; stroke-width: 1.25; stroke-dasharray: 4 3; fill: none; }
    .node-fill    { fill: #ffffff; }
    .node-stroke  { stroke: #30a2ff; stroke-opacity: 0.5; stroke-width: 1.25; fill: none; }
    .gpu-trainer-fill { fill: #30a2ff; fill-opacity: 0.18; }
    .gpu-trainer-stroke { stroke: #30a2ff; stroke-opacity: 0.55; stroke-width: 1; fill: none; }
    .gpu-vllm-fill { fill: #fdb517; fill-opacity: 0.5; }
    .gpu-vllm-stroke { stroke: #e5a315; stroke-width: 1; fill: none; }
    .bus-fill   { fill: #fdb517; }
    .bus-stroke { stroke: #e5a315; stroke-width: 1.5; fill: none; }
    .bus-text   { fill: #1c1917; }
    .conn   { stroke: #30a2ff; stroke-opacity: 0.6; stroke-width: 1.5; stroke-linecap: round; fill: none; }
    .bus-conn { stroke: #e5a315; stroke-width: 1.75; stroke-linecap: round; fill: none; }
    .divider { stroke: #30a2ff; stroke-opacity: 0.18; stroke-width: 1; }
    .arrow-fill { fill: #30a2ff; fill-opacity: 0.85; }
    .arrow-bus-fill { fill: #e5a315; }
    .fg     { fill: #0f172a; }
    .muted  { fill: #64748b; }
    .title  { fill: #2891e6; }
    @media (prefers-color-scheme: dark) {
      .panel-bg    { fill: #30a2ff; fill-opacity: 0.1; }
      .panel-stroke{ stroke: #30a2ff; stroke-opacity: 0.55; }
      .node-fill   { fill: #0f172a; }
      .node-stroke { stroke: #30a2ff; stroke-opacity: 0.6; }
      .gpu-trainer-fill { fill: #30a2ff; fill-opacity: 0.24; }
      .gpu-trainer-stroke{ stroke: #30a2ff; stroke-opacity: 0.6; }
      .gpu-vllm-fill{ fill: #fdb517; fill-opacity: 0.4; }
      .gpu-vllm-stroke{ stroke: #fbc04a; }
      .bus-stroke{ stroke: #fbc04a; }
      .conn { stroke: #30a2ff; stroke-opacity: 0.65; }
      .bus-conn { stroke: #fbc04a; }
      .arrow-fill { fill: #60b8ff; fill-opacity: 0.9; }
      .arrow-bus-fill { fill: #fbc04a; }
      .fg     { fill: #e2e8f0; }
      .muted  { fill: #94a3b8; }
      .title  { fill: #60b8ff; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
    <marker id="barr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-bus-fill" />
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="title" font-size="13" font-weight="700" letter-spacing="2">WEIGHT TRANSFER · TWO BACKENDS · FOUR PHASES</text>

  <!-- Phase strip at top -->
  <text x="40" y="54" class="title" font-size="11" font-weight="700" letter-spacing="1">PROTOCOL</text>
  <g>
    <rect x="110" y="42" width="170" height="22" rx="6" class="node-fill" />
    <rect x="110" y="42" width="170" height="22" rx="6" class="node-stroke" />
    <text x="195" y="58" text-anchor="middle" class="fg mono" font-size="10">① init_weight_transfer</text>

    <rect x="288" y="42" width="170" height="22" rx="6" class="node-fill" />
    <rect x="288" y="42" width="170" height="22" rx="6" class="node-stroke" />
    <text x="373" y="58" text-anchor="middle" class="fg mono" font-size="10">② start_weight_update</text>

    <rect x="466" y="42" width="170" height="22" rx="6" class="node-fill" />
    <rect x="466" y="42" width="170" height="22" rx="6" class="node-stroke" />
    <text x="551" y="58" text-anchor="middle" class="fg mono" font-size="10">③ update_weights ×N</text>

    <rect x="644" y="42" width="190" height="22" rx="6" class="node-fill" />
    <rect x="644" y="42" width="190" height="22" rx="6" class="node-stroke" />
    <text x="739" y="58" text-anchor="middle" class="fg mono" font-size="10">④ finish_weight_update</text>
  </g>

  <!-- ===== Left panel: NCCL — separate GPUs ===== -->
  <g>
    <rect x="30" y="80" width="430" height="276" rx="14" class="panel-bg" />
    <rect x="30" y="80" width="430" height="276" rx="14" class="panel-stroke" />
    <text x="48" y="106" class="title" font-size="13" font-weight="700" letter-spacing="1">NCCL · SEPARATE GPUs</text>
    <text x="48" y="124" class="muted" font-size="11">trainer GPU broadcasts new weights to vLLM workers</text>

    <!-- trainer GPU node -->
    <rect x="58" y="148" width="160" height="100" rx="10" class="node-fill" />
    <rect x="58" y="148" width="160" height="100" rx="10" class="node-stroke" />
    <text x="138" y="172" text-anchor="middle" class="title" font-size="12" font-weight="700">Trainer</text>
    <rect x="74" y="184" width="128" height="44" rx="6" class="gpu-trainer-fill" />
    <rect x="74" y="184" width="128" height="44" rx="6" class="gpu-trainer-stroke" />
    <text x="138" y="204" text-anchor="middle" class="fg mono" font-size="11" font-weight="700">GPU₀</text>
    <text x="138" y="220" text-anchor="middle" class="muted" font-size="10">FSDP / DeepSpeed</text>

    <!-- vLLM workers -->
    <rect x="272" y="148" width="170" height="100" rx="10" class="node-fill" />
    <rect x="272" y="148" width="170" height="100" rx="10" class="node-stroke" />
    <text x="357" y="172" text-anchor="middle" class="title" font-size="12" font-weight="700">vLLM workers</text>
    <rect x="288" y="184" width="60" height="44" rx="6" class="gpu-vllm-fill" />
    <rect x="288" y="184" width="60" height="44" rx="6" class="gpu-vllm-stroke" />
    <text x="318" y="204" text-anchor="middle" class="fg mono" font-size="11" font-weight="700">GPU₁</text>
    <text x="318" y="220" text-anchor="middle" class="muted" font-size="10">infer</text>
    <rect x="354" y="184" width="60" height="44" rx="6" class="gpu-vllm-fill" />
    <rect x="354" y="184" width="60" height="44" rx="6" class="gpu-vllm-stroke" />
    <text x="384" y="204" text-anchor="middle" class="fg mono" font-size="11" font-weight="700">GPU₂</text>
    <text x="384" y="220" text-anchor="middle" class="muted" font-size="10">infer</text>

    <!-- NCCL bus arrow -->
    <path d="M 218 198 L 270 198" class="bus-conn" marker-end="url(#barr)" />
    <text x="244" y="190" text-anchor="middle" class="bus-text" font-size="9.5" font-weight="600">NCCL</text>
    <text x="244" y="216" text-anchor="middle" class="bus-text" font-size="9.5">broadcast</text>

    <text x="48" y="278" class="title" font-size="10.5" font-weight="700" letter-spacing="1">USE WHEN</text>
    <text x="48" y="296" class="muted" font-size="10.5">RL trainer + rollout engine on different GPUs / nodes</text>
    <text x="48" y="316" class="title" font-size="10.5" font-weight="700" letter-spacing="1">TRANSPORT</text>
    <text x="48" y="334" class="muted" font-size="10.5">NCCL collective · works across NVLink and InfiniBand</text>
  </g>

  <!-- ===== Right panel: IPC — same GPU ===== -->
  <g>
    <rect x="480" y="80" width="450" height="276" rx="14" class="panel-bg" />
    <rect x="480" y="80" width="450" height="276" rx="14" class="panel-stroke" />
    <text x="498" y="106" class="title" font-size="13" font-weight="700" letter-spacing="1">IPC · SAME GPU</text>
    <text x="498" y="124" class="muted" font-size="11">trainer and inference share one GPU · pass CUDA IPC handles</text>

    <!-- Single shared GPU box that contains both trainer and vLLM -->
    <rect x="510" y="148" width="380" height="100" rx="12" class="gpu-trainer-fill" />
    <rect x="510" y="148" width="380" height="100" rx="12" class="gpu-trainer-stroke" />
    <text x="700" y="170" text-anchor="middle" class="title" font-size="11" font-weight="700" letter-spacing="1">SHARED GPU</text>

    <!-- Trainer block -->
    <rect x="526" y="180" width="156" height="58" rx="8" class="node-fill" />
    <rect x="526" y="180" width="156" height="58" rx="8" class="node-stroke" />
    <text x="604" y="200" text-anchor="middle" class="fg" font-size="11" font-weight="600">Trainer</text>
    <text x="604" y="216" text-anchor="middle" class="muted" font-size="10">owns weight tensor</text>
    <text x="604" y="230" text-anchor="middle" class="muted mono" font-size="9.5">cudaIpcGetMemHandle()</text>

    <!-- IPC handle bus -->
    <path d="M 684 210 L 716 210" class="bus-conn" marker-end="url(#barr)" />
    <text x="700" y="200" text-anchor="middle" class="bus-text" font-size="9" font-weight="600">handle</text>

    <!-- vLLM block -->
    <rect x="718" y="180" width="156" height="58" rx="8" class="node-fill" />
    <rect x="718" y="180" width="156" height="58" rx="8" class="node-stroke" />
    <text x="796" y="200" text-anchor="middle" class="fg" font-size="11" font-weight="600">vLLM</text>
    <text x="796" y="216" text-anchor="middle" class="muted" font-size="10">imports same memory</text>
    <text x="796" y="230" text-anchor="middle" class="muted mono" font-size="9.5">cudaIpcOpenMemHandle()</text>

    <text x="498" y="278" class="title" font-size="10.5" font-weight="700" letter-spacing="1">USE WHEN</text>
    <text x="498" y="296" class="muted" font-size="10.5">colocated training + inference on the same device(s)</text>
    <text x="498" y="316" class="title" font-size="10.5" font-weight="700" letter-spacing="1">TRANSPORT</text>
    <text x="498" y="334" class="muted" font-size="10.5">CUDA IPC handle exchange · zero-copy · single PCIe bus</text>
  </g>
</svg>
