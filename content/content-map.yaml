  "design/paged_attention.md":
    difficulty: 3
    summary: >-
      The core innovation behind vLLM: a virtual-memory-style page table
      for KV-cache that eliminates fragmentation and unlocks high batch
      sizes at long context.
    why: |
      Before PagedAttention (mid-2023), serving engines pre-allocated KV-cache
      for each in-flight request based on `max_model_len`. A 70B model with
      8K context on an 80GB H100 might fit only 4–8 concurrent users — most
      of the GPU was holding empty cache slots that "might be" used.

      PagedAttention drops internal fragmentation from ~60% to under 4%,
      fitting 30+ concurrent users on the same box. This is the single
      biggest reason vLLM was 24× faster than its 2023 competitors, and it's
      still the architectural moat that distinguishes serving engines.
    analogy: >-
      PagedAttention is to KV-cache what virtual memory is to your computer's
      RAM. Without virtual memory, every program would need one big
      contiguous chunk of physical RAM up front — and most of it would sit
      unused. With virtual memory, programs get small pages on demand. Same
      trick, applied to attention.
    exercises:
      - "Read `vllm/v1/core/block_pool.py`. What's the smallest allocation unit (a 'block')? How many tokens fit per block?"
      - "Trigger eviction on purpose: serve a long-context model and send requests until the engine has to evict KV-cache pages. What does the log say? Where is the eviction policy defined?"
      - "Compare with FlashAttention-3: PagedAttention is about *memory layout*, FA3 is about *compute kernels*. Which one dominates the speed-up for prefill-heavy traffic? For decode-heavy?"
    hero:
      type: image
      src: ../assets/design/paged_attention/key.png
      alt: PagedAttention key block layout
      caption: How a single attention key tensor is laid out across paged KV-cache blocks.
    related_concepts:
      - "design/arch_overview.md"
      - "design/attention_backends.md"
